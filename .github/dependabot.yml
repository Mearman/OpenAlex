# Dependabot configuration
# Cooldown: 5-day minimum release age before considering updates
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /sync
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    labels:
      - dependencies
      - python
