# Dependabot configuration
#
# Minimum release age (5 days) must be configured in GitHub UI:
#   Settings → Code security → Dependabot → Minimum release age
#
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /sync
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
