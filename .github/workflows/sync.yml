name: Sync OpenAlex Snapshot

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      entity:
        description: 'Entity to sync (empty = all)'
        required: false
        default: ''

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
      entity: ${{ steps.check.outputs.entity }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r sync/requirements.txt

      - name: Detect new shards
        id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ENTITY_ARG="${{ github.event.inputs.entity }}"
          if [ -n "$ENTITY_ARG" ]; then
            OUTPUT=$(python3 -m sync.ci_sync detect --entity "$ENTITY_ARG" 2>&1)
          else
            OUTPUT=$(python3 -m sync.ci_sync detect 2>&1)
          fi
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "No new shards"; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi
          echo "entity=$ENTITY_ARG" >> $GITHUB_OUTPUT

  sync:
    needs: detect
    if: needs.detect.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub Actions max; large runs may need this
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r sync/requirements.txt

      - name: Sync new shards
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ENTITY_ARG="${{ needs.detect.outputs.entity }}"
          if [ -n "$ENTITY_ARG" ]; then
            python3 -m sync.ci_sync sync --entity "$ENTITY_ARG"
          else
            python3 -m sync.ci_sync sync
          fi

      - name: Upload sync results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-results
          path: sync_results.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Report outcome
        if: always()
        run: |
          if [ -f sync_results.jsonl ]; then
            echo "## Sync results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat sync_results.jsonl >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            FAILED=$(grep -c '"status": "error"' sync_results.jsonl || true)
            OK=$(grep -c '"status": "ok"' sync_results.jsonl || true)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**${OK} succeeded, ${FAILED} failed**" >> $GITHUB_STEP_SUMMARY

            if [ "$FAILED" -gt 0 ]; then
              echo "::warning::${FAILED} shards failed to sync"
            fi
          fi

