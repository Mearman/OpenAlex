name: Sync OpenAlex Snapshot

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      entity:
        description: 'Entity to sync (empty = all)'
        required: false
        default: ''

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r sync/requirements.txt

      - name: Detect new shards
        id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          OUTPUT=$(python3 -m sync.ci_sync detect 2>&1)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "No new shards"; then
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
          fi

  sync:
    needs: detect
    if: needs.detect.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r sync/requirements.txt

      - name: Sync new shards
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          python3 -m sync.ci_sync sync

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::OpenAlex sync failed. Check logs for details."
